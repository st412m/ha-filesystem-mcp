name: "Filesystem MCP Server"
description: "MCP server for reading/writing files via Model Context Protocol"
version: "1.5.0-beta"
slug: filesystem_mcp
init: false
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
ports:
  3100/tcp: 3100
map:
  - media:rw
options:
  token: "changeme"
  vault_path: "/media/VAULT"
schema:
  token: str
  vault_path: str